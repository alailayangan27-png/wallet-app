<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lobstar Wallet</title>

  <link rel="stylesheet" href="style.css"/>

  <!-- Solana -->
  <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>
</head>

<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="title">🦞 LOBSTAR WALLET</div>
    <button onclick="connectWallet()" class="btn">Connect</button>
  </div>

  <!-- WALLET CARD -->
  <div class="card">
    <div class="label">Wallet</div>
    <div id="address">Not connected</div>
    <div id="sol">Loading...</div>
  </div>

  <!-- ACTIONS -->
  <div class="actions">
    <button onclick="sendSOL()">Send</button>
    <button onclick="receive()">Receive</button>
  </div>

  <!-- SEND FORM -->
  <div class="card">
    <input id="to" placeholder="Recipient Address"/>
    <input id="amount" placeholder="Amount (SOL)"/>
    <button onclick="sendSOL()">Confirm Send</button>
  </div>

  <!-- TWITTER FEED -->
  <div class="card">
    <div class="label">Lobstar Updates</div>

    <a class="twitter-timeline"
       data-theme="dark"
       data-height="400"
       href="https://twitter.com/USERNAME_KAMU">
       Tweets by Lobstar
    </a>
  </div>

</div>

<script async src="https://platform.twitter.com/widgets.js"></script>
<script src="app.js"></script>

</body>
</html>
