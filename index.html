<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lobstar Wallet</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <div class="header">
    <div class="brand">
      <img src="logo.png" class="logo-img">
      <div class="title">LOBSTAR WALLET</div>
    </div>

    <button class="connect" onclick="connectWallet()">Connect</button>
  </div>

  <div class="balance">
    <h1 id="sol">Loading...</h1>
    <p id="address">Not connected</p>
  </div>

  <div class="actions">
    <button onclick="openSend()">Send</button>
    <button onclick="receive()">Receive</button>
  </div>

  <div class="card" id="sendBox" style="display:none;">
    <input id="to" placeholder="Recipient address">
    <input id="sendAmount" placeholder="Amount SOL">
    <button onclick="send()">Confirm Send</button>
  </div>

  <p id="status"></p>

</div>

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>
<script src="app.js"></script>

</body>
</html>
