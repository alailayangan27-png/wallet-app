<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lobstar Wallet</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <div class="topbar">
    <div class="logo">LOBSTAR WALLET</div>
    <button class="connect-btn" onclick="connectWallet()">Connect</button>
  </div>

  <div class="card balance-card">
    <div class="label">Balance</div>
    <div id="sol" class="balance">Loading...</div>
    <div id="address" class="address">Not connected</div>
  </div>

  <div class="actions">
    <button onclick="openSend()">Send</button>
    <button onclick="receive()">Receive</button>
  </div>

  <div id="sendBox" class="card hidden">
    <input id="to" placeholder="Recipient address">
    <input id="amount" placeholder="Amount (SOL)">
    <button onclick="send()">Send Now</button>
  </div>

  <div id="status"></div>

</div>

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>
<script src="app.js"></script>

</body>
    </html>
