<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wallet</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">◎</div>
    <button class="connect" onclick="connectWallet()">Connect</button>
  </div>

  <!-- BALANCE -->
  <div class="balance">
    <h1 id="sol">0 SOL</h1>
    <p id="address">Not connected</p>
  </div>

  <!-- SWAP -->
  <div class="swap-box">
    <input id="amount" placeholder="0.0">

    <select id="token">
      <option>USDC</option>
      <option>BONK</option>
      <option>JUP</option>
    </select>

    <button onclick="swap()">Swap</button>
  </div>

  <p id="status"></p>

</div>

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>
<script src="app.js"></script>

</body>
</html>
