<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Crypto Wallet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="avatar"></div>
    <h3>Wallet</h3>
    <button class="connect-btn" onclick="connectWallet()">Connect</button>
  </div>

  <!-- BALANCE -->
  <div class="balance">
    <h1 id="usd">$0.00</h1>
    <p class="profit">+$0.00</p>
  </div>

  <!-- ACTIONS -->
  <div class="actions">
    <button onclick="connectWallet()">Deposit</button>
    <button onclick="buy()">Buy</button>
    <button onclick="openSend()">Send</button>
  </div>

  <!-- TOKENS -->
  <div class="tokens">
    <div class="token">
      <div class="left">
        <div class="logo sol"></div>
        <div>
          <h4>Solana</h4>
          <p id="sol">0 SOL</p>
        </div>
      </div>
      <div class="right">
        <h4 id="solUsd">$0.00</h4>
      </div>
    </div>
  </div>

  <!-- NAV -->
  <div class="navbar">
    <span>💰</span>
    <span>🔄</span>
    <span>⚡</span>
    <span>🌐</span>
  </div>

</div>

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>
<script src="./app.js"></script>

</body>
</html>
